version: 2

before:
  hooks:
    - go mod tidy

builds:
  - id: flaglint-go
    main: ./cmd/flaglint-go
    binary: flaglint-go
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X main.version={{.Version}}

archives:
  - id: default
    formats: [tar.gz]
    format_overrides:
      - goos: windows
        formats: [zip]
    name_template: >-
      {{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}

checksum:
  name_template: "checksums.txt"

changelog:
  disable: true # CHANGELOG.md is hand-maintained, matching flaglint-js's convention

release:
  github:
    owner: flaglint
    name: flaglint-go

# Homebrew publishing is temporarily disabled: it needs a
# HOMEBREW_TAP_GITHUB_TOKEN repo secret (a PAT with contents:write on the
# separate flaglint/homebrew-tap repo) that doesn't exist yet. Rather than
# ship v0.1.0 with a guaranteed-failing release step, this whole block is
# commented out for the first release and will be restored (uncomment,
# no version bump needed) in a follow-up PR once the secret is added.
# Deprecated in goreleaser v2.10 in favor of homebrew_casks, but kept here
# to match the existing flaglint-js formula's Formula/ convention in the
# same tap rather than mixing Formula and Cask layouts for two related
# products. Revisit if brews is ever removed outright, not just deprecated.
