name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test Go ${{ matrix.go-version }} (ubuntu)
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        go-version: ["1.22", "1.23"]
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go-version }}
          cache: true

      - name: Build
        run: go build ./...

      - name: Vet
        run: go vet ./...

      - name: Format check
        run: |
          unformatted=$(gofmt -l .)
          if [ -n "$unformatted" ]; then
            echo "The following files are not gofmt'd:"
            echo "$unformatted"
            exit 1
          fi

      - name: Test with coverage
        run: go test ./... -race -coverprofile=coverage.out

      - name: Upload coverage
        if: matrix.go-version == '1.23'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.out

  cross-platform:
    name: Test on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-go@v5
        with:
          go-version: "1.23"
          cache: true

      # Exercises path-separator-sensitive code (fingerprint normalization,
      # doublestar glob matching, go.mod-relative discovery) on every
      # platform this binary ships for — not just the CI host's OS.
      - name: Test
        run: go test ./...

  lint:
    name: golangci-lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-go@v5
        with:
          go-version: "1.23"
          cache: true

      # golangci-lint-action v6 flatly rejects any v2.x golangci-lint
      # version ("golangci-lint v2 is not supported by golangci-lint-action
      # v6, you must update to golangci-lint-action v7") — v7 is required
      # for a v2 config schema ("linters.default", top-level "formatters").
      # Found by this workflow's own first real run, not assumed.
      - uses: golangci/golangci-lint-action@v7
        with:
          version: v2.12.2

  goreleaser-check:
    name: Validate .goreleaser.yaml
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version: "1.23"
          cache: true

      # A snapshot build exercises the builds/archives/checksum config for
      # real (cross-compiling every goos/goarch combination) without
      # needing a tag or any publish credentials — the closest thing to
      # local validation available, since this environment couldn't run
      # goreleaser locally (go install and the official install script
      # both failed for local-environment reasons unrelated to the
      # config — see the release automation PR's description).
      - uses: goreleaser/goreleaser-action@v7
        with:
          version: "~> v2"
          args: release --snapshot --clean --skip=publish
