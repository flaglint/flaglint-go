name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test Go ${{ matrix.go-version }} (ubuntu)
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        go-version: ["1.22", "1.23"]
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go-version }}
          cache: true

      - name: Build
        run: go build ./...

      - name: Vet
        run: go vet ./...

      - name: Format check
        run: |
          unformatted=$(gofmt -l .)
          if [ -n "$unformatted" ]; then
            echo "The following files are not gofmt'd:"
            echo "$unformatted"
            exit 1
          fi

      - name: Test with coverage
        run: go test ./... -race -coverprofile=coverage.out

      - name: Upload coverage
        if: matrix.go-version == '1.23'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.out

  cross-platform:
    name: Test on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-go@v5
        with:
          go-version: "1.23"
          cache: true

      # Exercises path-separator-sensitive code (fingerprint normalization,
      # doublestar glob matching, go.mod-relative discovery) on every
      # platform this binary ships for — not just the CI host's OS.
      - name: Test
        run: go test ./...

  lint:
    name: golangci-lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-go@v5
        with:
          go-version: "1.23"
          cache: true

      # Pinned to a v2.x release explicitly: "latest" resolves to the
      # newest v1.x release for backward compat, which rejects this repo's
      # v2 config schema ("linters.default", top-level "formatters") with a
      # jsonschema validation error — found by this workflow's own first
      # real run, not assumed.
      - uses: golangci/golangci-lint-action@v6
        with:
          version: v2.12.2
