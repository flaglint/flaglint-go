name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  goreleaser:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version: "1.23"
          cache: true

      - uses: goreleaser/goreleaser-action@v7
        with:
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # A PAT with contents:write on flaglint/homebrew-tap — the
          # default GITHUB_TOKEN above can only push to this repo, not the
          # separate tap repo the Formula gets published to. Must be
          # created and added as a repo secret manually before the first
          # tagged release; goreleaser's Homebrew publish step fails
          # clearly if it's missing.
          HOMEBREW_TAP_GITHUB_TOKEN: ${{ secrets.HOMEBREW_TAP_GITHUB_TOKEN }}
