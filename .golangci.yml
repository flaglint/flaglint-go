version: "2"

linters:
  default: standard
  enable:
    - ineffassign
    - misspell
    - unconvert
    - unparam
    - unused
  exclusions:
    rules:
      # Test fixtures deliberately contain unused identifiers, unrelated
      # types with SDK-lookalike names, etc. — that's the point of them.
      - path: internal/scanner/testdata/
        linters:
          - unused
          - unparam

formatters:
  enable:
    - gofmt
    - goimports
